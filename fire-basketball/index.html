<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>烈火篮球</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="phone">
        <canvas id="game" width="430" height="760" aria-label="烈火篮球游戏画面"></canvas>
        <div id="tip" class="tip">点一下，篮球往上跳</div>
      </section>
      <section class="controls">
        <span>60 秒限时挑战</span>
        <span>连续进球会提速</span>
        <span>R 重开</span>
      </section>
    </main>
    <dialog id="resultDialog" class="result-dialog">
      <form method="dialog">
        <span class="result-kicker">本局结束</span>
        <h2>烈火篮球</h2>
        <div class="result-score" id="resultScore">0</div>
        <p id="resultMeta">最高 0 · 连击 0</p>
        <button value="restart" type="submit">再来一局</button>
      </form>
    </dialog>
    <script src="/shared/supabase-scores.js?v=supabase-1"></script>
    <script src="script.js?v=timed-1"></script>
  </body>
</html>
