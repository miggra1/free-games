<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16130e"/>
      <stop offset="1" stop-color="#0c0a08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2ce84"/>
      <stop offset=".55" stop-color="#d9a441"/>
      <stop offset="1" stop-color="#8a6220"/>
    </linearGradient>
    <radialGradient id="black" cx=".35" cy=".35" r=".7">
      <stop offset="0" stop-color="#555"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="white" cx=".35" cy=".35" r=".7">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#b8b0a0"/>
    </radialGradient>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency=".04 .08" numOctaves="3" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="10"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- 水墨晕染 -->
  <ellipse cx="200" cy="150" rx="170" ry="120" fill="#1e1a14" opacity=".6" filter="url(#ink)"/>
  <!-- 棋盘 -->
  <rect x="75" y="45" width="250" height="210" rx="4" fill="#241e16" stroke="url(#gold)" stroke-width="2"/>
  <g stroke="rgba(217,164,65,.35)" stroke-width="1.2">
    <line x1="100" y1="65" x2="100" y2="235"/>
    <line x1="137.5" y1="65" x2="137.5" y2="235"/>
    <line x1="175" y1="65" x2="175" y2="235"/>
    <line x1="212.5" y1="65" x2="212.5" y2="235"/>
    <line x1="250" y1="65" x2="250" y2="235"/>
    <line x1="287.5" y1="65" x2="287.5" y2="235"/>
    <line x1="325" y1="65" x2="325" y2="235"/>
    <line x1="100" y1="65" x2="325" y2="65"/>
    <line x1="100" y1="90" x2="325" y2="90"/>
    <line x1="100" y1="115" x2="325" y2="115"/>
    <line x1="100" y1="140" x2="325" y2="140"/>
    <line x1="100" y1="165" x2="325" y2="165"/>
    <line x1="100" y1="190" x2="325" y2="190"/>
    <line x1="100" y1="215" x2="325" y2="215"/>
    <line x1="100" y1="235" x2="325" y2="235"/>
  </g>
  <!-- 棋子 -->
  <circle cx="175" cy="115" r="10" fill="url(#black)"/>
  <circle cx="212.5" cy="140" r="10" fill="url(#white)"/>
  <circle cx="250" cy="115" r="10" fill="url(#black)"/>
  <circle cx="212.5" cy="90" r="10" fill="url(#white)"/>
  <circle cx="287.5" cy="140" r="10" fill="url(#black)"/>
  <!-- 标题 -->
  <text x="200" y="280" text-anchor="middle" font-family="STXingkai,STKaiti,KaiTi,serif" font-size="38" fill="url(#gold)" letter-spacing="8">五子棋</text>
  <text x="200" y="298" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9a8f7a" letter-spacing="3">GOMOKU</text>
</svg>