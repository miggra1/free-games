<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宝石消消乐</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div><span>关卡</span><strong id="level">1</strong></div>
        <div><span>分数</span><strong id="score">0</strong></div>
        <div><span>步数</span><strong id="moves">30</strong></div>
        <div><span>目标</span><strong id="target">3000</strong></div>
        <button id="restart" type="button">重开</button>
      </section>

      <section class="board-wrap">
        <canvas id="game" width="720" height="720" aria-label="消消乐游戏"></canvas>
        <div id="message" class="message hidden"></div>
      </section>
    </main>

    <script src="script.js?v=input-fix-1"></script>
  </body>
</html>
